[DEFAULT]
# Default synthesis language when the request does not specify one.
# "english"     - XTTS v2 model (see englishModelPath below)
# "kinyarwanda" - fine-tuned YourTTS model (model/ directory)
language = english

# Which ROS communication interface to expose at /textToSpeech/say_text.
# "service" - ROS service only  (cssr_system/TTS)
# "action"  - ROS action server only (cssr_system/TTSAction)
# "both"    - expose both simultaneously
interface = service

# Where the synthesized audio is played.
# "naoqi" - transfer to Pepper/NAO via SSH and play with ALAudioPlayer
# "local" - play on the local machine via paplay
playback_mode = naoqi

verboseMode = False

# NAOqi robot connection (used when playback_mode = naoqi)
ip = 172.29.111.240
port = 9559

# Set to True to use GPU acceleration if available
useCuda = False

# Path to the Kinyarwanda YourTTS model directory (model.pth, config.json, speakers.pth, etc.)
kinyarwandaModelPath = /home/muhirwa/reatimetts_ws/src/kinyarwanda_tts/model_files

# Path to the XTTS v2 model directory (config.json, model.pth, vocab.json, etc.)
englishModelPath = /home/muhirwa/models/v2.0.2

# Speaker reference WAV used for voice cloning by XTTS v2.
# Leave empty to use the Kinyarwanda conditioning_audio.wav from the model/ directory.
englishSpeakerWav =
