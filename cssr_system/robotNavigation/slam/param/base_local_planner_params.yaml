TebLocalPlannerROS:
  odom_topic: /naoqi_driver/odom
  map_frame: map

  teb_autosize: True
  dt_ref: 0.22
  dt_hysteresis: 0.05
  global_plan_overwrite_orientation: True
  max_global_plan_lookahead_dist: 2.2
  feasibility_check_no_poses: 5

  max_vel_x: 0.25
  max_vel_x_backwards: 0.18
  max_vel_theta: 0.40
  acc_lim_x: 0.45
  acc_lim_theta: 0.35
  min_turning_radius: 0.0

  footprint_model:
    type: "circular"
    radius: 0.30

  xy_goal_tolerance: 0.30
  yaw_goal_tolerance: 0.25
  free_goal_vel: False

  min_obstacle_dist: 0.22
  inflation_dist: 0.42
  dynamic_obstacle_inflation_dist: 0.30
  include_costmap_obstacles: True
  costmap_obstacles_behind_robot_dist: 0.5
  obstacle_poses_affected: 15

  costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 8

  no_inner_iterations: 4
  no_outer_iterations: 3
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.01

  weight_max_vel_x: 1
  weight_max_vel_theta: 1
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 1
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 300
  weight_kinematics_turning_radius: 1
  weight_optimaltime: 5
  weight_obstacle: 45
  weight_dynamic_obstacle: 60
  selection_alternative_time_cost: false

  enable_homotopy_class_planning: False
  enable_multithreading: True
  simple_exploration: True
  max_number_classes: 1
  roadmap_graph_no_samples: 8
  roadmap_graph_area_width: 2
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_keypoint_offset: 0.1
  obstacle_heading_threshold: 0.45
  visualize_hc_graph: False
