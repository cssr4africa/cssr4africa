local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 8.0
  publish_frequency: 4.0
  static_map: false
  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05
  transform_tolerance: 3.0
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: social_norm_layer, type: "cssr_nav_layer/SocialNormLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  social_norm_layer:
    enabled: true
    constraints_topic: /cssr_nav/social_constraints
    test_mode: false
    test_center_x: 1.0
    test_center_y: 0.0
    test_width: 1.0
    test_height: 0.8
    test_cost: 220
    bounds_padding: 0.15
